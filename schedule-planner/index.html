<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Planner</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>📅 Schedule Planner</h1>
            <p class="subtitle">Manage your schedule efficiently</p>
        </header>

        <main class="main-content">
            <!-- Form for adding event -->
            <section class="form-section">
                <h2>Add New Event</h2>
                <form id="eventForm" class="event-form">
                    <div class="form-group">
                        <label for="eventTitle">Event Title:</label>
                        <input 
                            type="text" 
                            id="eventTitle" 
                            placeholder="Enter event title"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="eventDate">Date:</label>
                        <input 
                            type="date" 
                            id="eventDate"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="eventTime">Time:</label>
                        <input 
                            type="time" 
                            id="eventTime"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="eventCategory">Category:</label>
                        <select id="eventCategory" required>
                            <option value="">Select category</option>
                            <option value="work">Work</option>
                            <option value="meeting">Meeting</option>
                            <option value="personal">Personal</option>
                            <option value="health">Health</option>
                            <option value="education">Education</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="eventDescription">Description:</label>
                        <textarea 
                            id="eventDescription" 
                            placeholder="Add event description (optional)"
                            rows="3"
                        ></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary">Add Event</button>
                </form>
                <div id="formError" class="error-message"></div>
            </section>

            <!-- Filters and sorting section -->
            <section class="filter-section">
                <h2>Filters & Sorting</h2>
                <div class="filters">
                    <div class="filter-group">
                        <label for="filterCategory">Filter by Category:</label>
                        <select id="filterCategory">
                            <option value="">All Categories</option>
                            <option value="work">Work</option>
                            <option value="meeting">Meeting</option>
                            <option value="personal">Personal</option>
                            <option value="health">Health</option>
                            <option value="education">Education</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label for="searchInput">Search:</label>
                        <input 
                            type="text" 
                            id="searchInput" 
                            placeholder="Search by title..."
                        >
                    </div>

                    <div class="filter-group">
                        <label for="sortBy">Sort by:</label>
                        <select id="sortBy">
                            <option value="date-asc">Date (Ascending)</option>
                            <option value="date-desc">Date (Descending)</option>
                            <option value="time-asc">Time (Ascending)</option>
                            <option value="title">Title (A-Z)</option>
                        </select>
                    </div>

                    <button id="clearFilters" class="btn btn-secondary">Clear Filters</button>
                </div>
            </section>

            <!-- Events display section -->
            <section class="events-section">
                <div class="section-header">
                    <h2>Events</h2>
                    <span id="eventCount" class="event-count">0 events</span>
                </div>

                <div id="eventsList" class="events-list">
                    <!-- Events will be added here dynamically -->
                </div>

                <div id="emptyState" class="empty-state">
                    <p>📭 No events at the moment</p>
                </div>
            </section>
        </main>

        <!-- Modal window for editing event -->
        <div id="editModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Edit Event</h3>
                    <button class="modal-close">&times;</button>
                </div>
                <form id="editForm" class="event-form">
                    <div class="form-group">
                        <label for="editTitle">Event Title:</label>
                        <input 
                            type="text" 
                            id="editTitle" 
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="editDate">Date:</label>
                        <input 
                            type="date" 
                            id="editDate"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="editTime">Time:</label>
                        <input 
                            type="time" 
                            id="editTime"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="editCategory">Category:</label>
                        <select id="editCategory" required>
                            <option value="work">Work</option>
                            <option value="meeting">Meeting</option>
                            <option value="personal">Personal</option>
                            <option value="health">Health</option>
                            <option value="education">Education</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="editDescription">Description:</label>
                        <textarea 
                            id="editDescription" 
                            rows="3"
                        ></textarea>
                    </div>

                    <div class="modal-buttons">
                        <button type="submit" class="btn btn-primary">Save</button>
                        <button type="button" class="btn btn-secondary" id="cancelEdit">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/eventManager.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
